<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Dashboard PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.11.11/controls.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }
        
        #header { 
            width: 100%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
            border-bottom: 1px solid #30363d; 
            padding-bottom: 15px; 
            box-sizing: border-box; 
        }
        
        h1 { font-size: 22px; font-weight: 700; color: #58a6ff; margin: 0; letter-spacing: -0.5px; }
        #chan-count { font-size: 13px; color: #8b949e; font-weight: 600; background: #21262d; padding: 4px 12px; border-radius: 20px; }
        
        .player-container { 
            width: 100%; 
            max-width: 820px; 
            background: #000; 
            margin-bottom: 40px; 
            z-index: 10; 
        }
        video { width: 100%; aspect-ratio: 16/9; display: block; }

        .category-container { width: 100%; margin-bottom: 45px; box-sizing: border-box; }
        .category-title { 
            font-size: 16px; 
            color: #f1e05a; 
            margin-bottom: 20px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }
        .category-title::before {
            content: "";
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #58a6ff;
            margin-right: 12px;
            border-radius: 2px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            width: 100%;
        }
        
        .channel-card { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.25s ease; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        .channel-card:hover { 
            transform: translateY(-5px); 
            border-color: #58a6ff; 
            background-color: #1c2128;
        }
        .channel-card.active { 
            border: 2px solid #58a6ff; 
            background-color: #21262d; 
        }
        
        .logo-box { 
            width: 100%; 
            height: 100px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #0d1117; 
            padding: 15px; 
            box-sizing: border-box; 
        }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info-box { 
            padding: 12px; 
            text-align: center; 
            border-top: 1px solid #30363d; 
            background: #161b22; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .name { 
            font-size: 13.5px; 
            font-weight: 600; 
            color: #f0f6fc; 
            text-transform: uppercase; 
            line-height: 1.3;
        }

        @media (max-width: 600px) {
            .grid { 
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
                gap: 12px; 
            }
            .logo-box { height: 80px; padding: 10px; }
            .name { font-size: 11.5px; }
            body { padding: 10px; }
        }
    </style>
</head>
<body id="mainBody" style="display:none;">

    <div id="header">
        <h1>DASHBOARD TV</h1>
        <div id="chan-count">Caricamento...</div>
    </div>

    <div class="player-container" data-shaka-player-container>
        <video autoplay data-shaka-player id="video"></video>
    </div>

    <div id="main-list" style="width: 100%;"></div>

<script type="module">
// === INICJALIZACJA APLIKACJI (ZAMIAST LOGOWANIA) ===
async function startApp() {
    // Odkrywamy główny interfejs odtwarzacza
    document.getElementById('mainBody').style.display = "flex";

    // Pobieramy playlistę bezpośrednio jako statyczny plik tekstowy z serwera
    try {
        const response = await fetch("./lista.m3u");

        if (!response.ok) {
            throw new Error(`Nie znaleziono pliku lista.m3u (Status: ${response.status})`);
        }

        // Czytamy plik jako jawny tekst (bez dekodowania Base64 / atob)
        const m3uData = await response.text();
        
        // Uruchamiamy odtwarzacz z pobraną treścią
        init(m3uData);

    } catch (error) {
        alert("Błąd ładowania playlisty: " + error.message);
        console.error(error);
    }
}

async function init(m3uContent) {
    const video = document.getElementById('video');
    const ui = video['ui'];
    const player = ui.getControls().getPlayer();
    const mainList = document.getElementById('main-list');
    const countHeader = document.getElementById('chan-count');

    player.configure({ streaming: { jumpLargeGaps: true } });

    function createCard(ch) {
        const name = (ch.group || "LISTA").toUpperCase().trim();
        let gridId = `grid-${name.replace(/[^a-z0-9]/gi, '-')}`;
        let grid = document.getElementById(gridId);
        
        if (!grid) {
            const container = document.createElement('div');
            container.className = 'category-container';
            container.innerHTML = `<div class="category-title">${name}</div><div class="grid" id="${gridId}"></div>`;
            mainList.appendChild(container);
            grid = document.getElementById(gridId);
        }

        const card = document.createElement('div');
        card.className = 'channel-card';
        card.innerHTML = `
            <div class="logo-box"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/150x80?text=TV'"></div>
            <div class="info-box"><div class="name">${ch.name}</div></div>
        `;
        
        card.onclick = async () => {
            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            await player.unload();
            
            // DRM
            player.configure({ drm: { clearKeys: ch.drm || {} } });

            // HEADERS PERSONALIZZATI
            if (ch.streamHeaders && Object.keys(ch.streamHeaders).length > 0) {
                player.configure({ streaming: { customHttpHeaders: ch.streamHeaders } });
            } else {
                player.configure({ streaming: { customHttpHeaders: {} } });
            }

            await player.load(ch.url);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        grid.appendChild(card);
    }

    const lines = m3uContent.split('\n');
    let currentChannel = { name: "", logo: "", group: "LISTA", drm: {}, url: "", streamHeaders: {} };
    let loadedCount = 0;

    for (let line of lines) {
        line = line.trim();
        if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
            const val = line.split('=')[1];
            try {
                currentChannel.drm = JSON.parse(val);
            } catch (e) {
                const parts = val.split(':');
                if (parts.length === 2) currentChannel.drm[parts[0].toLowerCase()] = parts[1].toLowerCase();
            }
        } 
        else if (line.startsWith('#KODIPROP:inputstream.adaptive.stream_headers=')) {
            const val = line.split('=')[1];
            if (val) {
                const pairs = val.split('&');
                pairs.forEach(pair => {
                    const [headerKey, headerValue] = pair.split('=');
                    if (headerKey && headerValue) {
                        currentChannel.streamHeaders[headerKey.trim()] = headerValue.trim();
                    }
                });
            }
        }
        else if (line.startsWith('#EXTINF:')) {
            const logo = line.match(/tvg-logo="([^"]+)"/i);
            const group = line.match(/group-title="([^"]+)"/i);
            const name = line.match(/,(.*)/);
            if (logo) currentChannel.logo = logo[1];
            if (group) currentChannel.group = group[1];
            if (name) currentChannel.name = name[1].trim();
        } 
        else if (line.startsWith('http')) {
            currentChannel.url = line;
            createCard(currentChannel);
            loadedCount++;
            currentChannel = { name: "", logo: "", group: "LISTA", drm: {}, url: "", streamHeaders: {} };
        }
    }

    countHeader.innerText = loadedCount + " CANALI";
}

// Uruchomienie aplikacji bezpośrednio po załadowaniu Shaka UI
document.addEventListener('shaka-ui-loaded', startApp);
</script>
</body>
</html>
